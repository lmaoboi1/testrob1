<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic 100M Experience</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: #050505;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            position: fixed; /* Prevents swiping and bouncing on mobile */
            touch-action: none; /* Disables browser scrolling gestures */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Screens --- */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.2s;
        }

        #start-screen {
            z-index: 10;
            opacity: 1;
            visibility: visible;
        }

        #congrats-screen {
            z-index: 5;
            opacity: 0;
            visibility: hidden;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 70%);
        }

        #congrats-screen.active {
            z-index: 20;
            opacity: 1;
            visibility: visible;
        }

        /* --- Start Screen Image --- */
        .start-image {
            position: absolute;
            bottom: calc(50% + 60px); /* Keeps play button dead-center, spaces image above */
            left: 50%;
            width: 400px;
            max-width: 85vw;
            height: auto;
            filter: drop-shadow(0 15px 30px rgba(0, 0, 0, 0.5));
            animation: float-center 5s ease-in-out infinite;
            pointer-events: none; /* Prevents blocking clicks */
        }

        @keyframes float-center {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -12px); }
        }

        /* --- Play Button & Loading --- */
        .play-btn {
            background: linear-gradient(135deg, #FFD700 0%, #FDB931 50%, #E6C200 100%);
            border: none;
            padding: 20px 60px;
            font-size: 24px;
            font-weight: 900;
            color: #000;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2), inset 0 0 10px rgba(255,255,255,0.5);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 240px;
            height: 75px;
            overflow: hidden;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .play-btn:hover:not(.loading) {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.4), inset 0 0 15px rgba(255,255,255,0.8);
        }

        .play-btn:hover:not(.loading)::before {
            left: 150%;
        }

        .play-btn:active:not(.loading) {
            transform: scale(0.98);
        }

        .btn-text {
            position: absolute;
            transition: opacity 0.3s, transform 0.3s;
        }

        .spinner {
            width: 35px;
            height: 35px;
            border: 4px solid rgba(0, 0, 0, 0.2);
            border-top-color: #000;
            border-radius: 50%;
            opacity: 0;
            position: absolute;
            transition: opacity 0.3s;
        }

        .play-btn.loading {
            cursor: default;
            width: 75px;
            padding: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFD700 0%, #FDB931 100%);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .play-btn.loading .btn-text {
            opacity: 0;
            transform: scale(0.5);
        }

        .play-btn.loading .spinner {
            opacity: 1;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- Congrats Content --- */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            display: block;
        }

        .congrats-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(to right, #f6d365 0%, #ffb347 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(30px);
            filter: drop-shadow(0 0 15px rgba(255, 179, 71, 0.3));
            transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s;
            text-align: center;
            line-height: 1.2;
        }

        .title-sub {
            display: block;
            font-size: 1.8rem;
            letter-spacing: 8px;
            margin-top: 15px;
            -webkit-text-fill-color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .counter-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            background: rgba(20, 20, 20, 0.6);
            padding: 30px 60px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(255, 215, 0, 0.05);
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: scale(0.85);
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.8s;
        }

        .title.show, .counter-wrapper.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .icon {
            width: 100px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6));
            animation: float 4s ease-in-out infinite;
        }

        .counter-text {
            font-size: 7rem;
            font-weight: 900;
            background: linear-gradient(180deg, #FFFFFF 0%, #E0E0E0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
            line-height: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* --- Collect Button --- */
        .collect-btn {
            margin-top: 50px;
            background: linear-gradient(135deg, #FFD700 0%, #FDB931 50%, #E6C200 100%);
            border: none;
            padding: 20px 60px;
            font-size: 26px;
            font-weight: 900;
            color: #000;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4), inset 0 0 15px rgba(255,255,255,0.6);
            opacity: 0;
            transform: translateY(40px) scale(0.8);
            pointer-events: none;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .collect-btn.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            animation: pulse-glow 2s infinite alternate ease-in-out 1s; /* Starts pulsing after showing */
        }

        .collect-btn:hover {
            transform: scale(1.05) translateY(-3px) !important;
            box-shadow: 0 15px 50px rgba(255, 215, 0, 0.8), inset 0 0 20px rgba(255,255,255,0.9) !important;
        }

        .collect-btn:active {
            transform: scale(0.95) !important;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4), inset 0 0 15px rgba(255,255,255,0.6); }
            100% { box-shadow: 0 10px 50px rgba(255, 215, 0, 0.8), inset 0 0 20px rgba(255,255,255,0.8); }
        }

        /* Glow effects */
        .glow-bg {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 2s ease 1s;
        }
        
        .congrats-content.show-glow .glow-bg {
            opacity: 1;
        }

        /* --- Responsive Design / Mobile Enhancements --- */
        @media (max-width: 768px) {
            .start-image {
                width: 320px;
                bottom: calc(50% + 55px);
            }
            .congrats-content {
                width: 100%;
                max-width: 100vw;
                padding: 0 15px;
                box-sizing: border-box;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }
            .title { 
                font-size: 2.2rem; 
                letter-spacing: 3px; 
                margin-bottom: 25px; 
                width: 100%;
                text-align: center;
            }
            .title-sub { 
                font-size: 1.1rem; 
                letter-spacing: 3px; 
                margin-top: 10px; 
            }
            .counter-wrapper { 
                padding: 25px; 
                flex-direction: column; 
                width: 100%;
                max-width: 90vw; /* Prevent horizontal overflow off-screen */
                gap: 15px; 
                margin: 0 auto;
                box-sizing: border-box;
                align-items: center;
            }
            .icon { 
                width: 65px; 
            }
            .counter-text { 
                font-size: clamp(3rem, 10vw, 4.5rem); /* Scaled slightly so it fits perfectly centered */
                text-align: center; 
                width: 100%;
                display: flex;
                justify-content: center;
            }
            .collect-btn { 
                font-size: 20px; 
                padding: 16px 35px; 
                margin-top: 35px; 
                width: 100%;
                max-width: 280px;
                display: block;
            }
        }

        @media (max-width: 480px) {
            .start-image {
                width: 250px;
                bottom: calc(50% + 50px);
            }
            .title { 
                font-size: 1.6rem; 
                letter-spacing: 1px; 
            }
            .title-sub { 
                font-size: 0.85rem; 
                letter-spacing: 2px; 
            }
            .counter-text { 
                font-size: clamp(2rem, 10.5vw, 3.2rem); /* Safely constrained to not push widths */
            }
            .icon { 
                width: 55px; 
            }
            .counter-wrapper { 
                padding: 20px 15px; 
                gap: 10px; 
                max-width: 95vw;
            }
            .collect-btn { 
                font-size: 18px; 
                padding: 15px 20px; 
            }
        }
    </style>
</head>
<body>

    <!-- Start Screen -->
    <div id="start-screen" class="screen">
        <img src="https://i.ibb.co/5ggfk7Cg/592dac9b-0a90-439c-ae82-62ce877f6416-clean.png" alt="Featured Image" class="start-image">
        <button id="play-btn" class="play-btn">
            <span class="btn-text" id="btn-text">Play</span>
            <div class="spinner" id="spinner"></div>
        </button>
    </div>

    <!-- Congratulations Screen -->
    <div id="congrats-screen" class="screen">
        <canvas id="confetti-canvas"></canvas>
        <div class="glow-bg"></div>
        <div class="congrats-content" id="congrats-content">
            <div class="title" id="title">
                CONGRATULATIONS
                <span class="title-sub">YOU'LL GET ROBUX</span>
            </div>
            <div class="counter-wrapper" id="counter-wrapper">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Robux_2019_Logo_gold.svg/1280px-Robux_2019_Logo_gold.svg.png" alt="Robux Icon" class="icon" onerror="this.style.display='none'">
                <div class="counter-text" id="counter">0</div>
            </div>
            <button id="collect-btn" class="collect-btn">Collect Robux</button>
        </div>
    </div>

    <script>
        // --- DOM Elements ---
        const playBtn = document.getElementById('play-btn');
        const startScreen = document.getElementById('start-screen');
        const congratsScreen = document.getElementById('congrats-screen');
        const titleEl = document.getElementById('title');
        const counterWrapper = document.getElementById('counter-wrapper');
        const counterEl = document.getElementById('counter');
        const congratsContent = document.getElementById('congrats-content');
        const canvas = document.getElementById('confetti-canvas');
        const collectBtn = document.getElementById('collect-btn');
        const ctx = canvas.getContext('2d');

        // --- Interaction Logic ---
        playBtn.addEventListener('click', () => {
            if (playBtn.classList.contains('loading')) return;
            
            // Enter Loading State
            playBtn.classList.add('loading');
            
            // Wait 3 seconds, then transition
            setTimeout(startCinematicTransition, 3000);
        });

        function startCinematicTransition() {
            // Fade out start screen
            startScreen.style.opacity = '0';
            
            setTimeout(() => {
                startScreen.style.visibility = 'hidden';
                
                // Show congrats screen
                congratsScreen.classList.add('active');
                
                // Trigger animations with slight delays for cinematic feel
                setTimeout(() => {
                    titleEl.classList.add('show');
                    counterWrapper.classList.add('show');
                    congratsContent.classList.add('show-glow');
                    initConfetti();
                    startCounterAnimation();
                }, 300);
            }, 1200); // Wait for fade out
        }

        // --- Number Formatting Logic ---
        function formatNumber(num) {
            if (num >= 1000000) {
                // Fixed 2 decimals for millions to prevent width from jumping and jittering
                return (num / 1000000).toFixed(2) + 'M';
            }
            if (num >= 1000) {
                // Fixed 1 decimal for thousands to keep character count stable
                return (num / 1000).toFixed(1) + 'K';
            }
            return Math.floor(num).toString();
        }

        // --- Counter Animation ---
        function startCounterAnimation() {
            const targetNumber = 100000000; // 100M
            const duration = 7000; // 7 seconds for a slightly slower, smoother effect
            const startTime = performance.now();

            function updateCounter(currentTime) {
                const elapsed = currentTime - startTime;
                let progress = elapsed / duration;
                if (progress > 1) progress = 1;

                // Easing Function: Smoother curve to prevent the "too fast" dragging feeling
                let easedProgress;
                if (progress < 0.75) {
                    // Slower, smoother acceleration (cubic instead of quartic)
                    easedProgress = Math.pow(progress / 0.75, 3) * 0.8;
                } else {
                    // Smooth deceleration to land gracefully
                    const p2 = (progress - 0.75) / 0.25;
                    easedProgress = 0.8 + (0.2 * (1 - Math.pow(1 - p2, 3)));
                }

                const currentValue = targetNumber * easedProgress;
                counterEl.innerText = formatNumber(currentValue);

                if (progress < 1) {
                    requestAnimationFrame(updateCounter);
                } else {
                    // Keep the decimals at the end so the wrapper doesn't instantly shrink
                    counterEl.innerText = '100.00M';
                    
                    // Show the collect button
                    collectBtn.classList.add('show');
                }
            }
            requestAnimationFrame(updateCounter);
        }

        // --- Confetti Particle System ---
        let particles = [];
        let confettiActive = false;
        
        // Resize canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const colors = [
            '#FFD700', '#FDB931', '#FFF8DC', // Golds
            '#ffffff', '#E6C200', '#DAA520'  // Whites & dark golds
        ];

        function initConfetti() {
            confettiActive = true;
            // Create initial burst
            for (let i = 0; i < 200; i++) {
                addParticle(true);
            }
            renderConfetti();
        }

        function addParticle(isInitialBurst = false) {
            particles.push({
                x: Math.random() * canvas.width,
                // If initial burst, spawn them spread out at the top. Otherwise just above the screen.
                y: isInitialBurst ? (Math.random() * canvas.height - canvas.height) : -20,
                r: Math.random() * 6 + 4, // size
                dx: Math.random() * 4 - 2, // x velocity
                dy: Math.random() * 5 + 3, // y velocity
                color: colors[Math.floor(Math.random() * colors.length)],
                tilt: Math.floor(Math.random() * 10) - 10,
                tiltAngleIncrement: (Math.random() * 0.07) + 0.05,
                tiltAngle: 0
            });
        }

        function renderConfetti() {
            if (!confettiActive) return;
            requestAnimationFrame(renderConfetti);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Continuously add a few particles to keep it raining
            if (particles.length < 300 && Math.random() < 0.5) {
                addParticle();
            }

            particles.forEach((p, index) => {
                p.tiltAngle += p.tiltAngleIncrement;
                p.y += p.dy;
                p.x += p.dx;
                p.dy += 0.02; // slight gravity

                // Wavy x movement
                p.x += Math.sin(p.tiltAngle) * 1;

                ctx.beginPath();
                ctx.lineWidth = p.r;
                ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r, p.y);
                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
                ctx.stroke();

                // Remove particles that go out of bounds
                if (p.y > canvas.height + 20) {
                    particles.splice(index, 1);
                }
            });
        }
    </script>
</body>
</html>
